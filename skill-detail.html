  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    /* 返回按钮 */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #00d9ff;
      text-decoration: none;
      font-size: 0.9em;
      margin-bottom: 30px;
      transition: opacity 0.3s;
    }
    .back:hover { opacity: 0.8; }
    
    /* 头部 */
    .header {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .icon {
      font-size: 4em;
      line-height: 1;
    }
    .info { flex: 1; }
    .info h1 {
      font-size: 1.8em;
      color: #fff;
      margin-bottom: 8px;
    }
    .info .name {
      color: #00d9ff;
      font-size: 0.9em;
      margin-bottom: 12px;
    }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      background: rgba(0,255,136,0.1);
      color: #00ff88;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8em;
    }
    
    /* 描述 */
    .section { margin-bottom: 30px; }
    .section h2 {
      font-size: 1em;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .desc {
      color: #ccc;
      line-height: 1.7;
    }
    
    /* 命令列表 */
    .commands {
      display: grid;
      gap: 10px;
    }
    .cmd-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 15px 20px;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cmd-item code {
      background: rgba(0,217,255,0.1);
      color: #00d9ff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.9em;
    }
    .cmd-item span {
      color: #888;
      font-size: 0.85em;
    }
    
    /* 使用方法 */
    .usage {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .usage code {
      color: #00ff88;
      font-size: 1.1em;
    }
    .usage p {
      color: #888;
      margin-top: 10px;
      font-size: 0.85em;
    }
    
    /* 作者 */
    .author {
      color: #666;
      font-size: 0.85em;
    }
    
    /* 加载中 */
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    
    /* 错误 */
    .error {
      text-align: center;
      padding: 60px;
      color: #ff6b6b;
    }
    
    /* 响应式 */
    @media (max-width: 600px) {
      .header { flex-direction: column; }
      .icon { font-size: 3em; }
      .info h1 { font-size: 1.4em; }
    }
  </style>
